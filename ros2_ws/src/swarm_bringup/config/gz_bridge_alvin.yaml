- ros_topic_name: "alvin/odom"
  gz_topic_name: "/model/alvin/odom"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

- ros_topic_name: "alvin/cmd_vel"
  gz_topic_name: "/model/alvin/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

- ros_topic_name: "alvin/scan"
  gz_topic_name: "/world/default/model/alvin/link/laser_link/sensor/laser/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

- ros_topic_name: "alvin/joint_states"
  gz_topic_name: "/world/default/model/alvin/joint_state"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS
